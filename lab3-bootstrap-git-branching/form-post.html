<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form POST - Bootstrap</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
          integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
          crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html">← Lab 3</a>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <h2>Form - POST Method</h2>
                <p class="text-muted">Data is sent in the request body — it does NOT appear in the URL.</p>

                <form action="form-post.html" method="POST">

                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter a password">
                        <small class="form-text text-muted">Passwords should always use POST, never GET.</small>
                    </div>

                    <div class="form-group">
                        <label for="course">Course</label>
                        <select class="form-control" id="course" name="course">
                            <option value="">-- Select --</option>
                            <option value="software">Software Development</option>
                            <option value="cs">Computer Science</option>
                            <option value="it">Information Technology</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea class="form-control" id="message" name="message" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn btn-dark btn-block">Submit with POST</button>
                </form>

                <div class="alert alert-info mt-4">
                    <strong>After submitting:</strong> open DevTools → Network tab → click the request →
                    go to <em>Payload</em>. The data is in the body, not the URL.
                </div>

                <a href="form-get.html" class="btn btn-outline-secondary mt-2">← Try GET instead</a>
            </div>
        </div>
    </div>

</body>
</html>
